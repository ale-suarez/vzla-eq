  <style>
          .material-symbols-outlined {
              font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
          }
          
          /* Analysis Pulse Animation */
          @keyframes soft-pulse {
              0% { transform: scale(1); opacity: 0.15; }
              50% { transform: scale(1.4); opacity: 0.05; }
              100% { transform: scale(1.8); opacity: 0; }
          }
          .pulse-ring {
              animation: soft-pulse 3s infinite ease-out;
          }
          .pulse-ring-delayed {
              animation: soft-pulse 3s infinite ease-out 1.5s;
          }
  
          /* Progress Bar Animation */
          @keyframes progress-fill {
              from { width: 0%; }
              to { width: 100%; }
          }
          .progress-animate {
              animation: progress-fill 10s linear forwards;
          }
  
          /* Floating Atmosphere */
          .glass-card {
              background: rgba(255, 255, 255, 0.7);
              backdrop-filter: blur(12px);
              -webkit-backdrop-filter: blur(12px);
          }
  
          /* Status Fade In/Out */
          .status-message {
              transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
          }
          .status-hidden {
              opacity: 0;
              transform: translateY(10px);
          }
      </style>
  <style>
          body {
            min-height: max(884px, 100dvh);

  <body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden">
  <!-- Top App Bar -->
  <header class="bg-surface fixed top-0 left-0 w-full z-50 h-14">

  <h1 class="text-headline-md font-headline-md font-bold text-primary tracking-tight">SafeStructure</h1>
  </div>
  <button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200">
  <span class="material-symbols-outlined">info</span>
  </button>
  </div>
  </header>
  <!-- Main Canvas -->
  <main class="flex-1 flex flex-col items-center justify-center px-margin-mobile pt-14 pb-10 relative overflow-hidden">
  <!-- Animated Background Elements -->
  <div class="absolute inset-0 pointer-events-none z-0">
  <div class="absolute top-1/4 -left-20 w-64 h-64 bg-primary-fixed-dim opacity-20 blur-[100px] rounded-full"></div>
  <div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-secondary-fixed-dim opacity-20 blur-[120px] rounded-full"></div>
  </div>
  <!-- AI Pulse Visualizer -->
  <div class="relative w-72 h-72 flex items-center justify-center z-10 mb-stack-lg">
  <!-- Pulsing Rings -->
  <div class="absolute w-full h-full rounded-full bg-primary pulse-ring"></div>
  <div class="absolute w-full h-full rounded-full bg-primary pulse-ring-delayed"></div>
  <!-- Core Scanner Visual -->
  <div class="w-48 h-48 rounded-full glass-card border border-outline-variant flex items-center justify-center shadow-lg relative overflow-hidden">
  <!-- Interior Scan Line -->
  <div class="absolute w-full h-1 bg-gradient-to-r from-transparent via-primary/40 to-transparent top-1/2 -translate-y-1/2 animate-bounce"></div>
  <div class="flex flex-col items-center gap-2">
  <span class="material-symbols-outlined text-primary text-[48px]" style="font-variation-settings: 'wght' 200;">biotech</span>
  <span class="text-label-caps font-label-caps text-primary uppercase tracking-widest">Analizando</span>
  </div>
  </div>
  </div>
  <!-- Progress Section -->
  <div class="w-full max-w-md z-10 flex flex-col gap-stack-md px-4">
  <!-- Rotating Status Messages -->
  <div class="h-8 flex items-center justify-center overflow-hidden">
  <p class="text-headline-sm font-headline-sm text-on-surface text-center status-message" id="status-text">
                      Iniciando escaneo estructural...
                  </p>
  </div>
  <!-- Custom Progress Bar -->
  <div class="w-full h-3 bg-surface-container rounded-full overflow-hidden border border-outline-variant/30">
  <div class="h-full bg-primary rounded-full progress-animate shadow-[0_0_12px_rgba(37,99,235,0.4)]" id="progress-bar"></div>
  </div>
  <!-- Meta info -->
  <div class="flex justify-between items-center text-on-surface-variant">
  <span class="text-body-md font-body-md">Tiempo estimado: 5-10 segundos</span>
  <span class="text-body-md font-body-md font-bold text-primary" id="percent-text">0%</span>
  </div>
  </div>
  <!-- Detailed Analysis Feed (Mini Bento) -->
  <div class="grid grid-cols-2 gap-stack-sm w-full max-w-md mt-stack-lg z-10">
  <div class="glass-card p-4 rounded-xl border border-outline-variant/30 flex flex-col gap-1">
  <span class="text-label-caps font-label-caps text-on-surface-variant">SENSORES</span>
  <div class="flex items-center gap-2">
  <span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
  <span class="text-body-md font-body-md font-semibold">Activo</span>
  </div>
  </div>
  <div class="glass-card p-4 rounded-xl border border-outline-variant/30 flex flex-col gap-1">
  <span class="text-label-caps font-label-caps text-on-surface-variant">CONFIANZA</span>
  <div class="flex items-center gap-2">
  <span class="text-body-md font-body-md font-semibold" id="confidence-val">94.2%</span>
  </div>
  </div>
  </div>
  </main>
  <script>
          const statusMessages = [
              "Detectando daños estructurales...",
              "Evaluando fatiga del concreto...",
              "Mapeando patrones de grietas...",
              "Ejecutando evaluación de alta fidelidad...",
              "Calculando umbrales de seguridad...",
              "Sintetizando informe final..."
          ];
  
          const statusEl = document.getElementById('status-text');
          const percentEl = document.getElementById('percent-text');
          const confidenceEl = document.getElementById('confidence-val');
          let currentStatusIndex = 0;
          let progressPercent = 0;
  
          // Rotate Messages
          function updateStatus() {
              statusEl.classList.add('status-hidden');
              setTimeout(() => {
                  currentStatusIndex = (currentStatusIndex + 1) % statusMessages.length;
                  statusEl.innerText = statusMessages[currentStatusIndex];
                  statusEl.classList.remove('status-hidden');
              }, 500);
          }
  
          setInterval(updateStatus, 2500);
  
          // Update Progress Numbers
          const progressInterval = setInterval(() => {
              progressPercent += 1;
              percentEl.innerText = `${progressPercent}%`;
              
              // Randomly fluctuate confidence slightly
              const baseConf = 94.2;
              const variance = (Math.random() * 0.4) - 0.2;
              confidenceEl.innerText = `${(baseConf + variance).toFixed(1)}%`;
  
              if (progressPercent >= 100) {
                  clearInterval(progressInterval);
                  // En una aplicación real, aquí pasaríamos a los resultados
                  setTimeout(() => {
                      statusEl.innerText = "Análisis completado";
                  }, 500);
              }
          }, 100);
      </script>
  </body></html>
